version: '3.8'

services:
  # PostgreSQL Database (alternative to SQLite)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: checkdem
      POSTGRES_USER: checkdem_user
      POSTGRES_PASSWORD: checkdem_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis for Celery
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: "docker-dev-key-change-in-production"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      DATABASE_URL: "postgresql://checkdem_user:checkdem_password@db:5432/checkdem"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    working_dir: /app

  # Celery Worker (optional)
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A checkdem_backend worker -l info
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: "docker-dev-key-change-in-production"
      DATABASE_URL: "postgresql://checkdem_user:checkdem_password@db:5432/checkdem"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
    depends_on:
      - db
      - redis
      - backend
    volumes:
      - ./backend:/app
    working_dir: /app

  # Frontend (optional with node)
  frontend:
    image: node:20-alpine
    command: npm run dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: "http://backend:8000/api"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    working_dir: /app

volumes:
  postgres_data:

networks:
  default:
    name: checkdem-network
